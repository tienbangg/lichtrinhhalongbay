<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hành Trình Hạ Long 2026</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
    
    <style>
        :root {
            --primary: #007aff;
            --success: #34c759;
            --danger: #ff3b30;
            --warning: #ff9500;
            --dark: #1c1c1e;
            --apple-font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            margin: 0; padding: 0; font-family: var(--apple-font);
            scroll-behavior: smooth; color: #f2f2f7; overflow-x: hidden;
            background-color: #000; background-attachment: fixed; background-position: center; background-size: cover;
            transition: background-image 0.8s ease-in-out;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation; 
        }

        input, textarea { user-select: auto; -webkit-user-select: auto; font-family: inherit;}

        body.modal-open { overflow: hidden !important; position: fixed; width: 100%; height: 100%; }

        .fade-in-up { opacity: 0; transform: translateY(30px); transition: opacity 0.8s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .fade-in-up.visible { opacity: 1; transform: translateY(0); }

        .hero { height: 100vh; height: 100dvh; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hero::before { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 1;}
        .hero-content { z-index: 2; padding: 20px; }
        .hero h1 { font-size: 4rem; margin-bottom: 5px; font-weight: 800; letter-spacing: -2px; text-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .hero p { font-size: 1.4rem; margin-bottom: 35px; font-weight: 400; text-shadow: 0 4px 10px rgba(0,0,0,0.3); color: #e5e5ea; }
        
        .btn { padding: 16px 32px; border-radius: 999px; font-weight: 600; font-size: 17px; border: none; cursor: pointer; transition: all 0.3s; }
        .btn:active { transform: scale(0.92); } 
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 8px 15px rgba(0, 122, 255, 0.3); }
        .btn-success { background: var(--success); color: white; box-shadow: 0 8px 15px rgba(52, 199, 89, 0.3); }
        
        .section { padding: 80px 20px; max-width: 1000px; margin: 0 auto; min-height: 50vh; position: relative; z-index: 2;}
        .section h2 { font-size: 2.5rem; text-align: center; font-weight: 700; margin-bottom: 40px; text-shadow: 0 2px 10px rgba(0,0,0,0.8);}
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
        
        .card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 24px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: 0.4s; position: relative; color: #1c1c1e; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        
        .card-action-btn { position: absolute; top: 15px; background: rgba(0,0,0,0.05); border: none; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 15px; transition: 0.2s; display: flex; align-items:center; justify-content:center;}
        .card-action-btn:active { transform: scale(0.85); background: rgba(0,0,0,0.1); }
        .btn-delete { right: 15px; color: var(--danger); }
        .btn-edit { right: 55px; color: var(--primary); }

        .floating-btn {
            position: fixed; border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.4); z-index: 1000; transition: 0.3s; 
            border: 1px solid rgba(255,255,255,0.15); color: white; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .floating-btn:active { transform: scale(0.92); }
        
        .add-btn { bottom: 30px; right: 30px; width: 65px; height: 65px; background: var(--primary); font-size: 30px;}
        .bag-btn { top: 30px; right: 30px; width: 55px; height: 55px; background: rgba(255, 149, 0, 0.9); font-size: 24px;}
        .bg-btn { top: 30px; left: 30px; background: rgba(0,0,0,0.6); font-size: 15px; width: auto; padding: 0 20px; border-radius: 999px; height: 44px; font-weight: bold;}
        .sync-btn { top: 85px; left: 30px; background: rgba(52, 199, 89, 0.8); font-size: 14px; width: auto; padding: 0 20px; border-radius: 999px; height: 44px; font-weight: bold; white-space: nowrap;}

        /* MODAL FORMS */
        .full-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 9998; display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; }
        .full-modal.active { display: flex; opacity: 1; }
        
        .form-container { position: relative; background: #1c1c1e; width: 90%; max-width: 500px; border-radius: 24px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); color: white;}
        .form-container h2 { margin-top: 0; margin-bottom: 20px; text-align: center;}
        
        /* Nút Tắt Form */
        .form-close-btn {
            position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.05); color: #a1a1aa;
            border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 14px;
            display: flex; justify-content: center; align-items: center; transition: 0.2s;
        }
        .form-close-btn:active { transform: scale(0.85); background: rgba(255,255,255,0.2); color: white;}

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; margin-bottom: 8px; color: #a1a1aa; font-weight: 600;}
        .form-group input { width: 100%; box-sizing: border-box; padding: 12px 15px; border-radius: 12px; border: 1px solid #333; background: #2c2c2e; color: white; font-size: 15px; outline: none;}
        .form-group input:focus { border-color: var(--primary); }
        .form-row { display: flex; gap: 15px;}
        .form-actions { display: flex; gap: 15px; margin-top: 25px; }
        .form-actions button { flex: 1; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: bold; border: none; cursor: pointer; transition: 0.2s;}
        .form-actions .btn-cancel { background: #3a3a3c; color: white;}
        .form-actions .btn-cancel:active { background: #2c2c2e; }

        /* BẢNG THÔNG BÁO CUSTOM TÙY CHỈNH */
        .custom-alert-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px); z-index: 10000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease;
        }
        .custom-alert-overlay.active { display: flex; opacity: 1; }
        .custom-alert-card { background: rgba(28,28,30,0.9); backdrop-filter: blur(25px); border-radius: 24px; padding: 30px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); }
        .alert-icon { font-size: 45px; margin-bottom: 10px; }
        .alert-message { font-size: 17px; font-weight: 500; color: white; margin-bottom: 25px; line-height: 1.4; word-wrap: break-word; }
        .alert-btn-group { display: flex; gap: 15px; justify-content: center; }
        .alert-btn { flex: 1; padding: 14px; border-radius: 14px; font-weight: 600; font-size: 16px; cursor: pointer; border: none; transition: 0.2s; }
        .alert-btn:active { transform: scale(0.95); }
        .btn-cancel { background: rgba(255,255,255,0.1); color: white; display: none; }
        .btn-confirm { background: var(--primary); color: white; }

        /* TÚI VIDEO SIDE PANEL */
        .side-panel {
            position: fixed; bottom: 100px; right: 30px; width: 360px; height: 450px; background: rgba(28,28,30,0.9); backdrop-filter: blur(25px); border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: none; flex-direction: column; overflow: hidden; z-index: 1000; border: 1px solid rgba(255,255,255,0.1);
        }
        @media (max-width: 768px) {
            .side-panel { width: calc(100vw - 40px); right: 20px; }
            .hero h1 { font-size: 3rem; }
        }
        .side-panel.active { display: flex; }
        .panel-header { background: rgba(255, 149, 0, 0.2); color: var(--warning); padding: 18px; font-weight: bold; text-align: center; }
        .panel-body { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .panel-body::-webkit-scrollbar { display: none; }
        .bag-input-area { padding: 15px; background: rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 10px; border-top: 1px solid rgba(255,255,255,0.05);}
        .bag-input-area input { width: 100%; box-sizing: border-box; padding: 10px 14px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; outline: none;}
        .bag-item { background: rgba(255,255,255,0.1); padding: 12px 15px; border-radius: 12px; border-left: 4px solid var(--warning); display: flex; justify-content: space-between; align-items: center;}
        .bag-actions button { border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; margin-left: 5px;}

        /* XEM VIDEO MODAL */
        .video-modal-content { 
            background: #1c1c1e; width: 90%; max-width: 900px; height: 75vh; border-radius: 24px; 
            display: flex; overflow: hidden; position: relative; flex-direction: row; box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        .video-modal-content .close-btn-red {
            position: absolute; top: 15px; left: 15px; z-index: 999; background: rgba(0, 0, 0, 0.6); color: white;
            border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; backdrop-filter: blur(10px);
        }
        .video-player { flex: 1.5; background: #000; position: relative; }
        .video-player iframe, .video-player video, .video-player img { width: 100%; height: 100%; border: none; }
        .video-info { flex: 1; padding: 40px; overflow-y: auto; color: #fff;}
        .video-only-mode .video-info { display: none; }
        .video-only-mode .video-player { flex: 1; }
        
        @media (max-width: 768px) {
            .video-modal-content { width: 100vw; height: 100%; height: 100dvh; border-radius: 0; flex-direction: column; }
            .video-player { height: 40vh; flex: none; }
            .video-info { padding: 25px; }
        }

        /* CROPPER & HIỆU ỨNG TIKTOK */
        .crop-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; overflow: hidden; }
        .crop-container img { max-width: 100%; max-height: 100%; }

        .play-btn-pulse {
            width: 80px; height: 80px; background: linear-gradient(135deg, #ff2d55, #ff375f);
            border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            cursor: pointer; box-shadow: 0 10px 30px rgba(255,45,85,0.4); transition: 0.3s;
        }
        .play-btn-pulse:active { transform: scale(0.9); }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spin-anim { display: inline-block; animation: spin 1.5s linear infinite; }
    </style>
</head>
<body>

    <div class="hero">
        <div class="hero-content">
            <h1 class="fade-in-up">Khám Phá Hạ Long</h1>
            <p class="fade-in-up" style="transition-delay: 0.1s;">Tự do Quản lý Lịch trình của Bạn</p>
            <div class="fade-in-up" style="transition-delay: 0.2s;">
                <a href="#destinations" class="btn btn-primary">Xem Lịch Trình</a>
            </div>
        </div>
    </div>

    <input type="file" id="bgUpload" accept="image/*" style="display:none">
    <div class="floating-btn bg-btn" onclick="document.getElementById('bgUpload').click()">🖼️ Đổi Nền</div>
    <div class="floating-btn sync-btn" id="syncStatus" onclick="fetchFromSheets()">☁️ Đồng Bộ</div>
    
    <div class="floating-btn bag-btn" onclick="toggleBag()">🎒 <span id="bagCount" style="font-size: 12px; position:absolute; top:-2px; right:-2px; background:red; border-radius:50%; width:22px; height:22px; display:flex; justify-content:center; align-items:center; color:white; font-weight:bold; border: 2px solid #1c1c1e;">0</span></div>
    
    <div class="floating-btn add-btn" onclick="openAddModal()">➕</div>

    <div class="side-panel" id="bagPanel">
        <div class="panel-header">🎒 Túi Video Lưu Trữ</div>
        <div class="panel-body" id="bagList"></div>
        <div class="bag-input-area">
            <input type="text" id="bagNameInput" placeholder="Tên túi (VD: Trend Tiktok)...">
            <div style="display: flex; gap: 8px;">
                <input type="text" id="bagInput" placeholder="Dán link YT/TikTok..." style="flex: 1;" onkeypress="if(event.key==='Enter') addVideoToBag();">
                <button onclick="addVideoToBag()" style="background:var(--warning); border:none; border-radius:8px; font-weight:bold; width: 45px; cursor:pointer;">+</button>
            </div>
        </div>
    </div>

    <div class="full-modal" id="addEditModal">
        <div class="form-container">
            <button class="form-close-btn" onclick="closeAddEditModal()">✕</button>
            <h2 id="modalFormTitle">Thêm Điểm Đến</h2>
            <input type="hidden" id="editId">
            
            <div class="form-group">
                <label>Tên địa điểm (*)</label>
                <input type="text" id="locName" placeholder="VD: Quán ốc Ngọc Sơn...">
            </div>
            
            <div class="form-group">
                <label>Dự kiến Thời gian</label>
                <input type="text" id="locTime" placeholder="VD: 19:00 Tối nay, Ngày mai...">
            </div>

            <div class="form-row">
                <div class="form-group" style="flex: 1;">
                    <label>Vĩ độ (Tùy chọn)</label>
                    <input type="number" id="locLat" placeholder="20.95" step="any">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Kinh độ (Tùy chọn)</label>
                    <input type="number" id="locLng" placeholder="106.99" step="any">
                </div>
            </div>

            <div class="form-group">
                <label>Link Video (Hoặc gọi "Túi số 1")</label>
                <input type="text" id="locVideo" placeholder="Link Tiktok, Youtube...">
            </div>

            <div class="form-actions">
                <button class="btn-cancel" onclick="closeAddEditModal()">Hủy bỏ</button>
                <button class="btn-primary" onclick="saveLocation()">Lưu thay đổi</button>
            </div>
        </div>
    </div>

    <div class="custom-alert-overlay" id="customAlertOverlay">
        <div class="custom-alert-card">
            <div class="alert-icon" id="alertIcon">⚠️</div>
            <div class="alert-message" id="alertMessage">Thông báo</div>
            <div class="alert-btn-group">
                <button class="alert-btn btn-cancel" id="alertCancelBtn" onclick="closeAlert()">Hủy</button>
                <button class="alert-btn btn-confirm" id="alertConfirmBtn">Xác nhận</button>
            </div>
        </div>
    </div>

    <div class="full-modal" id="cropModal" style="background: rgba(0,0,0,0.95); z-index: 10001;">
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; width: 100%; box-sizing: border-box; background: #1c1c1e; color: white;">
            <h3 style="margin:0;">Cắt ảnh nền</h3>
            <div>
                <button class="btn" style="background:#333; color:white; padding:10px 20px; border-radius:12px; margin-right:10px;" onclick="closeCropModal()">Hủy</button>
                <button class="btn btn-primary" style="padding:10px 20px; border-radius:12px;" onclick="saveCropBg()">Lưu</button>
            </div>
        </div>
        <div class="crop-container"><img id="cropImage"></div>
    </div>

    <section id="destinations" class="section">
        <h2 class="fade-in-up">📍 Lịch Trình (Chờ đi)</h2>
        <div class="grid" id="destList"></div>
    </section>

    <section id="diary" class="section">
        <h2 class="fade-in-up">📖 Nhật Ký (Đã Check-in)</h2>
        <div class="grid" id="diaryList"></div>
    </section>

    <div class="full-modal" id="videoModal">
        <div class="video-modal-content" id="modalContentBox" ontouchmove="event.stopPropagation()">
            <button class="close-btn-red" onclick="closeVideoModal()">✕</button>
            <div class="video-player" id="modalVidContainer"></div>
            <div class="video-info" id="modalInfoBox">
                <span style="background:rgba(0,122,255,0.15); color:#60a5fa; padding:6px 14px; border-radius:999px; font-size:13px; font-weight:700;" id="modalTime"></span>
                <h2 id="modalTitle" style="margin-top: 18px; font-size: 26px; font-weight: 800;"></h2>
                <button class="btn btn-primary" style="width:100%; margin-top:25px;" id="btnMaps">🗺️ Mở Bản Đồ Chỉ Đường</button>
                <button class="btn" style="width:100%; margin-top:12px; background:white; color:black;" id="btnCheckIn">✅ Đánh Dấu Đã Check-in</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
    <script>
        // ==========================================
        // CẤU HÌNH LIÊN KẾT GOOGLE SHEETS
        // ==========================================
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyW1azxgQ4rF-PrfhN98wz8UuiPSikd6wUbyFXEVEzDPWWXh5_Teo2MOoJF5ZKhTaVulw/exec";

        let locations = [];
        let videoBag = [];

        // HỆ THỐNG CUSTOM ALERT / CONFIRM
        let currentAlertCallback = null;
        function closeAlert() { document.getElementById('customAlertOverlay').classList.remove('active'); }
        function showCustomAlert(msg, type = "alert", callback = null) {
            document.getElementById('alertMessage').innerHTML = msg;
            const cancelBtn = document.getElementById('alertCancelBtn');
            const confirmBtn = document.getElementById('alertConfirmBtn');
            currentAlertCallback = callback;
            
            if (type === "confirm") {
                document.getElementById('alertIcon').innerText = "🗑️";
                cancelBtn.style.display = 'block';
                confirmBtn.style.display = 'block';
                confirmBtn.style.background = "var(--danger)";
                confirmBtn.innerText = "Xóa";
            } else {
                document.getElementById('alertIcon').innerText = "⚠️";
                cancelBtn.style.display = 'none';
                confirmBtn.style.display = 'block';
                confirmBtn.style.background = "var(--primary)";
                confirmBtn.innerText = "Đã hiểu";
            }

            confirmBtn.onclick = () => { 
                closeAlert(); 
                if (currentAlertCallback) currentAlertCallback(); 
            };
            document.getElementById('customAlertOverlay').classList.add('active');
        }

        // HỆ THỐNG ĐỒNG BỘ ÉP LƯU
        function forceSaveToLocal() {
            localStorage.setItem('halong_trip', JSON.stringify(locations));
            localStorage.setItem('halong_bag', JSON.stringify(videoBag));
        }

        async function fetchFromSheets() {
            if (!WEB_APP_URL || WEB_APP_URL.includes("DÁN_LINK")) return loadLocalData();
            try {
                document.getElementById('syncStatus').innerText = "⏳ Đang tải...";
                const res = await (await fetch(WEB_APP_URL + "?t=" + new Date().getTime())).json();
                if(res.success) {
                    locations = res.data || [];
                    videoBag = res.bags || [];
                    forceSaveToLocal(); renderUI(); renderBag();
                    document.getElementById('syncStatus').innerText = "☁️ Đã tải xong";
                    setTimeout(() => document.getElementById('syncStatus').innerText = "☁️ Đồng Bộ", 3000);
                } else { loadLocalData(); }
            } catch(e) { document.getElementById('syncStatus').innerText = "⚠️ Lỗi Mạng"; loadLocalData(); }
        }

        function syncToSheets() {
            if (!WEB_APP_URL || WEB_APP_URL.includes("DÁN_LINK")) return;
            forceSaveToLocal();
            document.getElementById('syncStatus').innerText = "⏳ Đang lưu...";
            fetch(WEB_APP_URL, {
                method: 'POST', redirect: 'follow',
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: 'saveAll', locations: locations, bags: videoBag })
            })
            .then(r => r.json())
            .then(res => {
                if(res.success) {
                    document.getElementById('syncStatus').innerText = "☁️ Đã đồng bộ";
                    setTimeout(() => document.getElementById('syncStatus').innerText = "☁️ Đồng Bộ", 3000);
                } else document.getElementById('syncStatus').innerText = "⚠️ Lỗi Sheet";
            }).catch(() => document.getElementById('syncStatus').innerText = "⚠️ Lỗi Mạng");
        }

        function loadLocalData() {
            try { locations = JSON.parse(localStorage.getItem('halong_trip')) || []; } catch(e) {}
            try { videoBag = JSON.parse(localStorage.getItem('halong_bag')) || []; } catch(e) {}
            renderUI(); renderBag();
        }

        window.addEventListener('DOMContentLoaded', () => { fetchFromSheets(); });

        // GIAO DIỆN HIỂN THỊ
        function renderUI() {
            const destList = document.getElementById('destList');
            const diaryList = document.getElementById('diaryList');
            destList.innerHTML = ''; diaryList.innerHTML = '';
            
            let destCount = 0, diaryCount = 0;

            locations.forEach((loc, index) => {
                const isChecked = loc.checkedIn;
                const deleteAction = isChecked ? `toggleCheckIn('${loc.id}', false)` : `askDeleteLoc('${loc.id}')`;
                const deleteIcon = isChecked ? `↩️` : `✕`;
                
                const cardHTML = `
                    <div class="card fade-in-up" style="border-left: 6px solid ${isChecked ? '#34c759' : '#007aff'}">
                        <button class="card-action-btn btn-delete" onclick="${deleteAction}">${deleteIcon}</button>
                        <button class="card-action-btn btn-edit" onclick="openEditModal('${loc.id}')">✏️</button>
                        <h3 style="margin-top:0; font-size:18px;">${loc.name} ${isChecked ? '✅' : ''}</h3>
                        <p style="font-size:14px; color:#8e8e93;">🕒 ${loc.time || 'Chưa định giờ'}</p>
                        <button class="btn btn-primary" style="padding:10px 20px; font-size:14px;" onclick="openVideoModal('${loc.id}')">Xem Chi tiết</button>
                    </div>`;
                    
                if(isChecked) { diaryList.innerHTML += cardHTML; diaryCount++; }
                else { destList.innerHTML += cardHTML; destCount++; }
            });

            if(destCount === 0) destList.innerHTML = `<p style="color:#8e8e93; grid-column: 1/-1; text-align:center;">Bấm nút ➕ để thêm điểm đến nha!</p>`;
            if(diaryCount === 0) diaryList.innerHTML = `<p style="color:#8e8e93; grid-column: 1/-1; text-align:center;">Chưa Check-in ở đâu cả.</p>`;

            document.querySelectorAll('.fade-in-up').forEach(el => observer.observe(el));
        }

        // LOGIC THÊM VÀ SỬA (FORM MODAL)
        function openAddModal() {
            document.getElementById('modalFormTitle').innerText = "Thêm Điểm Đến Mới";
            document.getElementById('editId').value = '';
            document.getElementById('locName').value = '';
            document.getElementById('locTime').value = '';
            document.getElementById('locLat').value = '';
            document.getElementById('locLng').value = '';
            document.getElementById('locVideo').value = '';
            document.getElementById('addEditModal').classList.add('active');
            document.body.classList.add('modal-open');
        }

        function openEditModal(id) {
            const loc = locations.find(l => l.id === id);
            if (!loc) return;
            document.getElementById('modalFormTitle').innerText = "Sửa: " + loc.name;
            document.getElementById('editId').value = loc.id;
            document.getElementById('locName').value = loc.name;
            document.getElementById('locTime').value = loc.time;
            document.getElementById('locLat').value = loc.lat;
            document.getElementById('locLng').value = loc.lng;
            document.getElementById('locVideo').value = loc.videoUrl;
            document.getElementById('addEditModal').classList.add('active');
            document.body.classList.add('modal-open');
        }

        function closeAddEditModal() {
            document.getElementById('addEditModal').classList.remove('active');
            document.body.classList.remove('modal-open');
        }

        function saveLocation() {
            const id = document.getElementById('editId').value;
            const name = document.getElementById('locName').value.trim();
            const time = document.getElementById('locTime').value.trim();
            const lat = document.getElementById('locLat').value.trim();
            const lng = document.getElementById('locLng').value.trim();
            let videoUrl = document.getElementById('locVideo').value.trim();

            if (!name) { showCustomAlert("Vui lòng nhập Tên địa điểm!", "alert"); return; }

            // Giải mã "Túi số X" nếu có
            if (videoUrl.toLowerCase().includes('túi số')) {
                let idx = parseInt(videoUrl.replace(/[^0-9]/g, '')) - 1;
                if (!isNaN(idx) && videoBag[idx] && videoBag[idx].url) videoUrl = videoBag[idx].url;
            }

            if (id) {
                let loc = locations.find(l => l.id === id);
                loc.name = name; loc.time = time; loc.lat = lat; loc.lng = lng; loc.videoUrl = videoUrl;
            } else {
                locations.push({
                    id: new Date().getTime().toString(),
                    name: name, time: time, lat: lat, lng: lng, videoUrl: videoUrl,
                    checkedIn: false, desc: ""
                });
            }

            closeAddEditModal();
            forceSaveToLocal(); renderUI(); syncToSheets();
        }

        // XÓA BẰNG CUSTOM ALERT THAY VÌ CONFIRM
        function askDeleteLoc(id) {
            showCustomAlert("Bạn có chắc chắn muốn xóa vĩnh viễn điểm đến này không?", "confirm", () => {
                locations = locations.filter(l => l.id !== id);
                forceSaveToLocal(); renderUI(); syncToSheets();
            });
        }
        
        function toggleCheckIn(id, status) {
            let loc = locations.find(l => l.id === id);
            if(loc) { loc.checkedIn = status; forceSaveToLocal(); renderUI(); syncToSheets(); }
        }

        // TÚI VIDEO
        function toggleBag() { document.getElementById('bagPanel').classList.toggle('active'); }
        function renderBag() {
            document.getElementById('bagCount').innerText = videoBag.length;
            const list = document.getElementById('bagList');
            list.innerHTML = videoBag.length === 0 ? '<p style="color:#666; text-align:center;">Trống.</p>' : '';
            videoBag.forEach((vid, idx) => {
                list.innerHTML += `
                    <div class="bag-item">
                        <span style="font-weight: 600; color: var(--warning); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">[Túi ${idx + 1}] ${vid.name || 'Video'}</span>
                        <div class="bag-actions">
                            <button style="background:var(--success);" onclick="openVideoModal(null, '${vid.url}', ${idx})">▶</button>
                            <button style="background:var(--danger);" onclick="askDeleteBagVideo(${idx})">✕</button>
                        </div>
                    </div>`;
            });
        }
        function addVideoToBag() {
            let name = document.getElementById('bagNameInput').value.trim();
            let url = document.getElementById('bagInput').value.trim();
            if(url) { 
                videoBag.push({ name: name || `Video ${videoBag.length + 1}`, url: url }); 
                document.getElementById('bagNameInput').value = ''; document.getElementById('bagInput').value = '';
                forceSaveToLocal(); renderBag(); syncToSheets(); 
            }
        }
        
        function askDeleteBagVideo(idx) {
            showCustomAlert("Bạn có chắc chắn muốn xóa video này khỏi túi?", "confirm", () => {
                videoBag.splice(idx, 1); 
                forceSaveToLocal(); renderBag(); syncToSheets(); 
            });
        }

        // 🔴 LAZY RESOLVER TRONG MODAL VIDEO
        function getEmbedCode(url, locId = null, bagIdx = null) {
            if (!url) return "<p style='color:white; text-align:center; padding-top:20px;'>Chưa có Video</p>";
            
            if (url.match(/\.(jpeg|jpg|gif|png|webp)$/i)) return `<img src="${url}" style="width:100%; height:100%; object-fit:contain; background:#000;">`;
            if (url.match(/\.(mp4|webm|ogg)$/i)) return `<video controls autoplay style="width:100%; height:100%; background:#000;"><source src="${url}"></video>`;

            if (url.includes('tiktok.com')) {
                if (url.includes('vt.tiktok') || url.includes('vm.tiktok')) {
                    let clickArgs = `'${url}', ${locId ? `'${locId}'` : 'null'}, ${bagIdx !== null ? bagIdx : 'null'}`;
                    return `
                    <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100%; padding:20px; text-align:center; background:#111; width:100%;">
                        <div class="play-btn-pulse" onclick="resolveAndPlay(${clickArgs})">
                            <span style="color: white; font-size: 35px; margin-left: 5px;">▶</span>
                        </div>
                        <h3 style="color:white; margin-top: 25px; margin-bottom: 10px;">Video TikTok Tích Hợp</h3>
                        <p style="color:#a1a1aa; font-size:14px; line-height:1.5; max-width: 80%;">Bấm PLAY để hệ thống tự động bóc tách link gốc, đồng bộ lên Google Sheets và phát video!</p>
                    </div>`;
                }
                const ttMatch = url.match(/video\/(\d+)/);
                return `<iframe src="https://www.tiktok.com/player/v1/${ttMatch ? ttMatch[1] : ''}?autoplay=1" allowfullscreen scrolling="no" style="width:100%; height:100%; border:none;"></iframe>`;
            }
            const ytMatch = url.match(/(?:youtube\.com.*[?&]v=|youtu\.be\/)([^&]+)/);
            if (ytMatch) return `<iframe src="https://www.youtube.com/embed/${ytMatch[1]}?autoplay=1" allowfullscreen scrolling="no" style="width:100%; height:100%; border:none;"></iframe>`;
            
            return `
            <div style="position:relative; width:100%; height:100%; background:#000;">
                <iframe src="${url}" allowfullscreen style="width:100%; height:100%; border:none; background:#fff;"></iframe>
                <a href="${url}" target="_blank" style="position:absolute; top:15px; right:20px; z-index:40; background:rgba(0,0,0,0.7); color:white; padding:8px 15px; border-radius:999px; font-size:12px; text-decoration:none; backdrop-filter:blur(5px); font-weight:bold; border: 1px solid rgba(255,255,255,0.2);"> Mở link gốc ↗</a>
            </div>`;
        }

        async function resolveTikTokShortLink(shortUrl) {
            try {
                const controller1 = new AbortController();
                const timeout1 = setTimeout(() => controller1.abort(), 4000);
                const res1 = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(shortUrl)}`, { signal: controller1.signal });
                clearTimeout(timeout1);
                if (res1.ok) {
                    const data = await res1.json();
                    if (data && data.data && data.data.id) return `https://www.tiktok.com/video/${data.data.id}`;
                }
            } catch (e) {}

            const proxies = [
                `https://api.allorigins.win/get?url=${encodeURIComponent(shortUrl)}`,
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(shortUrl)}`
            ];
            for (let proxy of proxies) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 4000); 
                    const response = await fetch(proxy, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    
                    if (!response.ok) continue;
                    let finalUrl = ""; let html = "";
                    if (proxy.includes('allorigins')) {
                        const data = await response.json();
                        finalUrl = data.status?.url || ""; html = data.contents || "";
                    } else { html = await response.text(); }
                    
                    let ttMatch = finalUrl.match(/video\/(\d+)/);
                    if (ttMatch) return `https://www.tiktok.com/video/${ttMatch[1]}`;

                    const canonicalMatch = html.match(/<link\s+rel="canonical"\s+href="([^"]+)"/i);
                    if (canonicalMatch && canonicalMatch[1]) {
                        ttMatch = canonicalMatch[1].match(/video\/(\d+)/);
                        if (ttMatch) return `https://www.tiktok.com/video/${ttMatch[1]}`;
                    }
                } catch (e) {}
            }
            return null; 
        }

        async function resolveAndPlay(shortUrl, locId, bagIdx) {
            const container = document.getElementById('modalVidContainer');
            container.innerHTML = `
                <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100%; background:#111; color:#007aff;">
                    <span class="spin-anim" style="font-size:40px; margin-bottom:15px;">⏳</span>
                    <h3>Đang bóc tách và đồng bộ...</h3>
                    <p style="font-size:13px; color:#a1a1aa;">Hệ thống đang tự lưu link gốc lên Mây, đợi xíu nha...</p>
                </div>`;

            let longUrl = await resolveTikTokShortLink(shortUrl);

            if (longUrl) {
                if (locId && locId !== 'null') {
                    let loc = locations.find(l => l.id === locId);
                    if (loc) loc.videoUrl = longUrl;
                }
                if (bagIdx !== null && bagIdx !== undefined && bagIdx !== 'null') {
                    if(videoBag[bagIdx]) videoBag[bagIdx].url = longUrl;
                }

                forceSaveToLocal();
                syncToSheets(); 
                
                renderUI(); renderBag();
                container.innerHTML = getEmbedCode(longUrl);
            } else {
                container.innerHTML = `
                <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100%; background:#111; text-align:center; padding:20px;">
                    <span style="font-size:40px; margin-bottom:10px;">⚠️</span>
                    <h3 style="color:#ff3b30;">Phân Giải Thất Bại</h3>
                    <p style="color:#a1a1aa; font-size:14px; margin-bottom: 20px;">Bảo mật quá cao. Hãy bấm vào nút dưới đây để xem trên ứng dụng TikTok nhé!</p>
                    <a href="${shortUrl}" target="_blank" style="padding: 12px 24px; background: #ff2d55; color: white; text-decoration: none; border-radius: 999px; font-weight: bold;">Mở Ứng Dụng TikTok</a>
                </div>`;
            }
        }

        // RENDER VIDEO MODAL CHÍNH
        function openVideoModal(id, rawUrl = null, bagIdx = null) {
            document.getElementById('bagPanel').classList.remove('active');
            document.body.classList.add('modal-open'); 

            const contentBox = document.getElementById('modalContentBox');
            if(rawUrl) {
                contentBox.classList.add('video-only-mode');
                document.getElementById('modalVidContainer').innerHTML = getEmbedCode(rawUrl, null, bagIdx);
            } else {
                contentBox.classList.remove('video-only-mode');
                const loc = locations.find(l => l.id === id);
                document.getElementById('modalTitle').innerText = loc.name;
                document.getElementById('modalTime').innerText = loc.time;
                document.getElementById('modalVidContainer').innerHTML = getEmbedCode(loc.videoUrl, id);
                
                document.getElementById('btnMaps').onclick = () => window.open(`https://www.google.com/maps/search/?api=1&query=${loc.lat ? loc.lat+','+loc.lng : encodeURIComponent(loc.name)}`, '_blank');
                
                const btnCheck = document.getElementById('btnCheckIn');
                if (loc.checkedIn) { 
                    btnCheck.style.background = 'var(--success)'; btnCheck.style.color = 'white'; btnCheck.innerText = '✅ Đã Check-in'; btnCheck.onclick = null; 
                } else { 
                    btnCheck.style.background = 'white'; btnCheck.style.color = 'black'; btnCheck.innerText = 'Đánh dấu Đã Check-in'; 
                    btnCheck.onclick = () => { toggleCheckIn(id, true); closeVideoModal(); }; 
                }
            }
            document.getElementById('videoModal').classList.add('active');
        }
        function closeVideoModal() { 
            document.getElementById('videoModal').classList.remove('active'); 
            document.getElementById('modalVidContainer').innerHTML = ''; 
            document.body.classList.remove('modal-open'); 
        }

        // CROP NỀN
        let currentBg = localStorage.getItem('halong_bg') || 'https://images.unsplash.com/photo-1528127269322-539801943592?q=80&w=2070';
        document.body.style.backgroundImage = `url('${currentBg}')`;
        let cropper;
        document.getElementById('bgUpload').onchange = (e) => {
            let file = e.target.files[0]; if(!file) return;
            let reader = new FileReader();
            reader.onload = function(ev){
                document.getElementById('cropModal').classList.add("active");
                document.getElementById('cropImage').src = ev.target.result;
                setTimeout(() => { if(cropper) cropper.destroy(); cropper = new Cropper(document.getElementById('cropImage'), { aspectRatio: 16/9, viewMode: 1 }); }, 100);
            }
            reader.readAsDataURL(file);
        }
        function saveCropBg(){
            if(!cropper) return;
            const img = cropper.getCroppedCanvas({ width: 1920, height: 1080 }).toDataURL("image/jpeg");
            document.body.style.backgroundImage = `url(${img})`;
            localStorage.setItem("halong_bg", img);
            closeCropModal(); document.getElementById('bgUpload').value = '';
        }
        function closeCropModal() { document.getElementById('cropModal').classList.remove("active"); }

        const observer = new IntersectionObserver((e) => { e.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('visible'); else entry.target.classList.remove('visible'); }); }, { threshold: 0.1 });
    </script>
